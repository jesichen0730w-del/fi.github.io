  <style>
    :root {

      --line: #e2e8f0;
      --text: #0f172a;
      --subtext: #64748b;
      --accent: #7c3aed;
      --accent-2: #d946ef;
      --accent-3: #ec4899;

      --radius-md: 16px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100%; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, var(--bg3) 0%, transparent 30%),

      overflow-x: hidden;
    }

    .orb {
      position: fixed;
      border-radius: 999px;
      filter: blur(60px);
      opacity: 0.28;
      pointer-events: none;
      z-index: 0;
    }
    .orb.a { width: 260px; height: 260px; left: -30px; top: 50px; background: #c4b5fd; }
    .orb.b { width: 320px; height: 320px; right: -60px; top: 120px; background: #f9a8d4; }
    .orb.c { width: 240px; height: 240px; left: 42%; bottom: -40px; background: #bfdbfe; }

    .page {
      position: relative;
      z-index: 1;
      width: min(1400px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    .hero {
      background: linear-gradient(135deg, rgba(255,255,255,.72), rgba(255,255,255,.52));
      border: 1px solid rgba(255,255,255,0.8);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);

    }

    .badge {

      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 14px;
      background: rgba(255,255,255,.82);
      border: 1px solid rgba(255,255,255,.92);
      color: #475569;
      font-size: 13px;
      font-weight: 700;

    .desc {

      font-size: 16px;
      line-height: 1.9;

    .layout {

      gap: 18px;
      margin-top: 20px;
      min-height: 720px;

    .column {

      border: 1px solid rgba(255,255,255,0.82);
      border-radius: 28px;

      color: var(--subtext);
      line-height: 1.7;

      overflow: auto;
    }

    .item {
      width: 100%;
      border: 1px solid transparent;
      background: rgba(255,255,255,.72);
      border-radius: 18px;
      padding: 16px 14px;
      text-align: left;

      transition: all .22s ease;
      margin-bottom: 12px;

    .item-title {

      font-weight: 800;
      line-height: 1.55;
      color: var(--text);
    }

    .item-sub {
      margin-top: 8px;
      font-size: 13px;
      color: var(--subtext);
      line-height: 1.7;
    }

    .detail {
      padding: 22px;
      height: 100%;
      overflow: auto;
    }

    .placeholder {
      height: 100%;
      min-height: 520px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      border: 2px dashed #cbd5e1;
      border-radius: 24px;
      color: var(--subtext);
      background: rgba(255,255,255,.55);

      margin-bottom: 14px;

      color: #6d28d9;

      border-radius: 999px;
      padding: 7px 12px;

      border: 1px solid rgba(255,255,255,.92);
      border-radius: 26px;
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: cardPop .28s ease both;

      padding: 22px;
      background: linear-gradient(135deg, #7c3aed 0%, #d946ef 55%, #ec4899 100%);

    }

    .product-top h3 {
      margin: 0;
      font-size: 28px;
      line-height: 1.3;
    }

    .product-top p {
      margin: 10px 0 0;
      font-size: 14px;
      line-height: 1.8;
      color: rgba(255,255,255,.92);
    }

    .product-body {
      padding: 22px;
      display: grid;
      gap: 14px;
    }

    .info {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px 16px 14px;
      background: #fff;
    }

    .info-label {
      font-size: 13px;
      font-weight: 800;
      color: #7c3aed;
      margin-bottom: 8px;
    }

    .info-text {
      color: #475569;
      font-size: 15px;
      line-height: 1.9;
      word-break: break-word;
    }

    .count {
      margin-top: 8px;
      font-size: 12px;
      color: #94a3b8;
    }

    .footer {
      margin-top: 14px;
      text-align: center;
      color: #94a3b8;
      font-size: 13px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes cardPop {
      from { opacity: 0; transform: translateY(12px) scale(.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (max-width: 1200px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .list {
        max-height: none;
      }
      .placeholder {
        min-height: 260px;
      }
    }

: "小微企业不收取任何费用，付款期限可达1年，不上征信、不占用传统授信额度。", "elements": "贷款额度最高可达我行受让付款凭证金额的100%。贷款期限：核心企业供应链合作项目额度期限原则不超过1年，最长不超过3年；单笔保理融资期限原则上不超过1年，最长不超过2年。还款方式 期初付息、到期还本。", "contact": "魏代秀，5357200"}, {"name": "乳山农业银行产业链贷", "target": "产业链核心企业及其上下游主体（含企业、个体工商户、农户、个人等），用于其日常生产经营周转。", "advantage": "为链条企业提供融资便利，为核心企业降低融资成本。", "elements": "核心企业贷款额度，根据核心企业生产经营情况等确定；上下游主体中企业主体贷款额度原则上不超过借款人与核心企业年均收购价款的70%。贷款期限最长不超过5年。", "contact": "李宁 06316698608"}, {"name": "乳山农业银行农业产业链贷款", "target": "从事农产品收购、仓储、运输、加工、销售及农业生产资料供应、技术服务等农业产业化企业；为核心企业从事农业生产加工储存的农户、农民专业合作社、家庭农场、种养大户等。", "advantage": "为链条企业提供融资便利，为核心企业降低融资成本。", "elements": "根据核心企业生产经营情况等确定，上下游客户贷款额度原则上不得超过借款人与核心企业一个生产经营周期收购价款的70%。", "contact": "李宁 06316698608"}]}]}, {"title": "三、外汇收支和跨境人民币产品", "children": [{"title": "（一）国际信用证", "products": [{"name": "工商银行进口信用证", "target": "客户作为进口商，需以信用证方式与出口商进行结算。", "advantage": "1.速度快：通过工商银行众多的海外分行及代理行网络，工商银行会为您精心选择最快捷的路线，确保在最短的时间内将信用证传送通知行。2.接受程度高：信用证能否融资大多取决于开证银行的资信，工商银行凭借自身优良的资信，所开立的信用证为国际银行界所接受，因而方便出口商凭信用证进行融资。3.种类丰富：工商银行可根据您的需要，开立包括可转让、背对背、即期付款、延期付款、议付、买方远期信用证等不同种类的信用证，满足您个性化的贸易需要。", "elements": "开证行（我行）依照开证申请人的要求和指示，承诺在符合信用证条款情况下，凭规定的单据，向第三者（受益人）或其指定人进行承付；或授权另一银行进行承付；或授权另一银行议付。", "contact": "袁静宇 0631-5675308"}, {"name": "工商银行出口信用证", "target": "客户作为出口商，在不甚了解进口商的资信情况时，需要对方客户提供银行信用的付款承诺。", "advantage": "工商银行将委派单证处理中心经验丰富的国际结算专家人员，为客户提供银行业务专家技术性指导服务，在货物出运后顺利收回货款奠定坚实的基础。", "elements": "出口商（受益人）收到国外进口商通过其银行开立的信用证，承诺在单证相符条件下付款的结算工具。银行作为通知行/议付行为出口商提供信用保障。", "contact": "袁静宇 0631-5675308"}, {"name": "农业银行国际信用证", "target": "符合条件的贸易型和生产型进出口企业。", "advantage": "通过银行信用替代商业信用，降低买卖双方交易风险。", "elements": "进口贸易合同或订单、进口许可证或进口配额证等批件等资料。信用证付款期限一般情况下最长不超过一年。", "contact": "吕婧 2971037"}, {"name": "中国银行进口开证", "target": "1.进出口双方希望对彼此的行为进行一定约定以提升贸易的可信度。2.进口商处于卖方市场，且出口商坚持使用信用证方式进行结算。3.进出口双方流动资金不充裕，有使用贸易融资的打算。", "advantage": ".改善谈判地位。开立信用证相当于为出口商提供了商业信用以外的有条件付款承诺，进口商可据此争取到比较合理的货物价位。2.货物有所保证。变商业信用为银行信用，银行的介入可以使贸易本身更有保证，有效控制货权、装期以及货物的质量。3.减少资金占压。对于使用授信开证的进口商来讲，在开证后付款前可减少自有资金的占用。", "elements": "进口信用证业务是指我行在进口贸易中应进口客户的申请，向出口商开立的信用证，承诺出口商提交符合信用证要求的单据情况下，向出口商付款。进口开证需要占用授信额度，业务期限即期、远期，较为灵活，能够满足客户需求。", "contact": "迟文明0631-5190139"}, {"name": "建设银行进口开证", "target": "在我行有授信的外贸企业，该产品是指银行根据进口商（申请人）的要求和指示，向出口商（受益人）开具的在规定的期限内、凭规定的单据支付一定金额的书面承诺。", "advantage": "信用提升，交易安全，减少资金占用。", "elements": "开立信用证时需提供：开证申请书、贸易合同、付款/承兑通知书、进口许可证（如需）、货物贸易外汇业务登记表（如需）等", "contact": "宋静静 0631-5208664"}, {"name": "交通银行进口开证", "target": "采用信用证结算的进口企业", "advantage": "总行设立单证中心，集中处理客户开证申请。客户授信额度已生效的情况下，可实现当日开出信用证，主打便捷高效。", "elements": "授信额度、贸易背景、加盖印章的业务申请资料。", "contact": "王素娟 0631-5219765"}, {"name": "中信银行线上进口开证", "target": "1.时间敏感型客户：如抢订单、赶船期、需快速开证。2.高频交易客户：年开立量较大，线上化开证可显著减少人力成本和脚底成本。3.网银集群客户：客户如为网银集群客户，可使用核心企业证书登录企业网银并选择集团模式进入开证。", "advantage": "1.我行已实现线上、线下两种交易受理模式，客户可根据需要自行选择。2.支持7x24小时在线申请，无需跑银行柜台，单据上传、条款填写均通过网银完成。3.单笔业务可实现系统自动用信，加快信用证业务处理效率。4.客户可以实时查看开证进度，全流程追踪，避免信息滞后。", "elements": "在中信银行有进口开证授信额度，开通企业网银国际业务进口开证功能即可办理", "contact": "李敏 5325539"}, {"name": "招商银行信用证闪融开证", "target": "授信企业", "advantage": "全流程线上，自动审批效率高", "elements": "线上化、自动审批", "contact": "林涛 5854075"}, {"name": "民生银行网银进口开证", "target": "适用有短期资金融资需求且采用信用证方式结算的进口企业", "advantage": "网银开立，可以保存模板，企业无需准备纸质盖章材料，可以免保证金开立。", "elements": "银行信用、单据条款", "contact": "王晓瑜  5857727"}, {"name": "兴业银行进口开证", "target": "在我行有授信的进口企业", "advantage": "通过单证通线上提交开证申请，节省脚底成本", "elements": "在我行有授信，贸易背景真实", "contact": "王林林 0631-5882057"}, {"name": "光大银行进口信用证", "target": "适用于有进口业务的客户。", "advantage": "拓展海外贸易伙伴，拓宽进口渠道，增加出口商的选择，进而降低进口成本。通过电子交单形式替代纸单形式完成信用证下单据流转，避免单据遗失，安全环保，加速企业履行间单据流转，节省单据在途时间，进口企业早提货，出口企业早收汇。", "elements": "办理流程：①国内进口商与境外出口商签订进出口合同。②进口商向光大银行提供相关申请材料，申请开立信用证。③经光大银行审核（包括但不限于KYC、外管政策、我行授信额度及信用证条款）后开立以出口商为受益人的信用证。④境外出口商提交信用证中规定的相关单据（可安排议付融资）。⑤开证行审核单证一致后，进口商付款或向开证行申请进口信用证项下融资，银行按期向交单行/议付行付款。⑥交单行将货款解付信用证受益人。", "contact": "池佳欣5353799"}, {"name": "光大银行出口信用证", "target": "适用于有出口业务的客户。", "advantage": "1.高效的通知服务：收到境外开证行开出的信用证，毫不延误并准确无误地通知国内受益人，确保受益人第一时间按照信用证的要求备货制单。2.审单服务专业：单证中心专业的服务团队，严谨的工作作风，将为出口商提交的单据提供一流水平的审核意见，从而最大限度地降低出口单据拒付概率，保障出口商顺利收汇。", "elements": "办理流程：①出口商在与国外进口商签订进出口合同。②国外进口商向国外开证行申请           <span>${section.title}</span>
          <span>${sub.title}</span>
          <span>共 ${products.length} 个产品</span>
        </div>
        ${products.map((product, idx) => `
          <div class="product-card" style="margin-bottom:16px;">
            <div class="product-top">
              <h3>${product.name}</h3>
              <p>第 ${idx + 1} 个产品</p>
            </div>
            <div class="product-body">
              <div class="info">
                <div class="info-label">适用对象</div>
                <div class="info-text">${product.target || '未填写'}</div>
              </div>
              <div class="info">
                <div class="info-label">产品优势</div>
                <div class="info-text">${product.advantage || '未填写'}</div>
              </div>
              <div class="info">
                <div class="info-label">产品要素</div>
                <div class="info-text">${product.elements || '未填写'}</div>
              </div>
              <div class="info">
                <div class="info-label">联系人 / 联系方式</div>
                <div class="info-text">${product.contact || '未填写'}</div>
              </div>
            </div>
          </div>
        `).join("")}
      `;
    }

    function selectLevel1(index) {
      activeLevel1 = index;
      activeLevel2 = 0;
      renderLevel1();
      renderLevel2();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function selectLevel2(index) {
      activeLevel2 = index;
      renderLevel2();
    }

    renderLevel1();
    renderLevel2();
  </script>
</body>
</html>
